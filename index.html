<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASL Trainer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 20px;
      }

      .header {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .control-group label {
        font-size: 12px;
        font-weight: 600;
        color: #555;
      }

      select,
      input[type="number"] {
        padding: 8px;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
      }

      select:focus,
      input[type="number"]:focus {
        border-color: #667eea;
      }

      .btn {
        padding: 8px 16px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.3s;
      }

      .btn:hover {
        background: #5568d3;
      }

      .btn-secondary {
        background: #764ba2;
      }

      .btn-secondary:hover {
        background: #5a3a7e;
      }

      .btn-small {
        padding: 5px 10px;
        font-size: 12px;
      }

      .main-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        padding: 60px;
        min-width: 700px;
        min-height: 500px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .card-content {
        width: 100%;
      }

      .word {
        font-size: 96px;
        font-weight: bold;
        color: #333;
        margin-bottom: 10px;
      }

      .category-badge {
        display: inline-block;
        background: #667eea;
        color: white;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 600;
      }

      .video-container {
        width: 100%;
        margin-bottom: 20px;
      }

      #videoPlayer {
        width: 100%;
      }

      .embed-container {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        width: 100%;
        max-width: 100%;
        border-radius: 10px;
        background: #f0f0f0;
      }

      .embed-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      .no-video {
        font-size: 24px;
        color: #999;
        padding: 40px;
      }

      .bottom-controls {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
      }

      .control-btn {
        background: white;
        border: none;
        border-radius: 50%;
        width: 60px;
        height: 60px;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .control-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
      }

      .control-btn:active {
        transform: translateY(0);
      }

      .control-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .control-btn.active {
        background: #667eea;
      }

      .empty-state {
        font-size: 18px;
        color: #666;
      }

      .stats {
        margin-top: 20px;
        font-size: 14px;
        color: #fff;
        text-align: center;
      }

      .timer-bar {
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 15px;
      }

      .timer-progress {
        height: 100%;
        background: #fff;
        width: 0%;
        transition: width 0.1s linear;
      }

      .btn-learning-mode {
        background: #764ba2;
      }

      .btn-learning-mode:hover {
        background: #5a3a7e;
      }

      .btn-learning-mode.active {
        background: #28a745;
      }

      .btn-learning-mode.active:hover {
        background: #218838;
      }

      .learning-controls {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 30px;
      }

      .btn-know {
        background: #28a745;
        font-size: 18px;
        padding: 15px 30px;
      }

      .btn-know:hover {
        background: #218838;
      }

      .btn-dont-know {
        background: #dc3545;
        font-size: 18px;
        padding: 15px 30px;
      }

      .btn-dont-know:hover {
        background: #c82333;
      }

      .btn-continue {
        background: #667eea;
        font-size: 18px;
        padding: 15px 30px;
        margin-top: 10px;
      }

      .btn-continue:hover {
        background: #5568d3;
      }

      .learning-badge {
        font-size: 14px;
        color: #999;
        margin-top: 10px;
      }

      /* ── Celebration ──────────────────────────────────────────── */

      .celebration-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }

      .celebration-overlay.open {
        display: flex;
      }

      #confettiCanvas {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 201;
      }

      .celebration-card {
        position: relative;
        z-index: 202;
        background: white;
        border-radius: 20px;
        padding: 48px 40px 36px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        max-width: 340px;
        width: 90vw;
        animation: celebrationPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      @keyframes celebrationPop {
        from {
          transform: scale(0.6);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .celebration-emoji {
        font-size: 64px;
        line-height: 1;
        margin-bottom: 16px;
      }

      .celebration-title {
        font-size: 26px;
        font-weight: 800;
        color: #333;
        margin-bottom: 8px;
      }

      .celebration-subtitle {
        font-size: 15px;
        color: #777;
        margin-bottom: 28px;
      }

      .summary-stats {
        display: flex;
        gap: 16px;
        justify-content: center;
        margin-bottom: 28px;
      }

      .summary-stat {
        flex: 1;
        padding: 14px 10px;
        border-radius: 10px;
        text-align: center;
      }

      .summary-stat.known {
        background: #d4edda;
      }
      .summary-stat.unknown {
        background: #f8d7da;
      }

      .summary-stat-count {
        font-size: 32px;
        font-weight: 800;
        line-height: 1;
      }

      .summary-stat.known .summary-stat-count {
        color: #28a745;
      }
      .summary-stat.unknown .summary-stat-count {
        color: #dc3545;
      }

      .summary-stat-label {
        font-size: 12px;
        font-weight: 600;
        color: #555;
        margin-top: 4px;
      }

      /* ── Unknown words panel ─────────────────────────────────── */

      .unknown-panel {
        position: fixed;
        right: 20px;
        top: 20px;
        bottom: 20px;
        width: 180px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        display: none;
        flex-direction: column;
        padding: 15px;
        z-index: 10;
      }

      .unknown-panel.visible {
        display: flex;
      }

      .unknown-panel-title {
        font-size: 12px;
        font-weight: 700;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 10px;
        flex-shrink: 0;
      }

      .unknown-panel-count {
        display: inline-block;
        background: #dc3545;
        color: white;
        border-radius: 10px;
        padding: 1px 7px;
        font-size: 11px;
        margin-left: 4px;
      }

      .unknown-panel-list {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-height: 0;
      }

      .unknown-word-item {
        font-size: 13px;
        font-weight: 600;
        color: #dc3545;
        padding: 5px 8px;
        background: #fff5f5;
        border-radius: 5px;
        border-left: 3px solid #dc3545;
        flex-shrink: 0;
        cursor: pointer;
        transition: background 0.12s;
      }

      .unknown-word-item:hover {
        background: #ffd6d6;
        border-left-color: #b02a37;
      }

      .unknown-panel-empty {
        font-size: 12px;
        color: #bbb;
        text-align: center;
        margin-top: 10px;
        font-style: italic;
      }

      /* ── Alphabet navigation bar ──────────────────────────────── */
      .alphabet-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 220px;
        display: none;
        justify-content: center;
        flex-wrap: nowrap;
        gap: 2px;
        padding: 7px 10px;
        background: transparent;
        z-index: 10;
      }

      .alphabet-bar.visible {
        display: flex;
      }

      .alpha-btn {
        width: 27px;
        height: 27px;
        border: none;
        border-radius: 4px;
        background: transparent;
        font-size: 11px;
        font-weight: 700;
        cursor: default;
        color: rgba(255, 255, 255, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition:
          background 0.12s,
          color 0.12s;
        flex-shrink: 0;
      }

      .alpha-btn.has-words {
        color: rgba(255, 255, 255, 0.9);
        cursor: pointer;
      }

      .alpha-btn.has-words:hover {
        background: rgba(255, 255, 255, 0.2);
        color: white;
      }

      /* ── User Selection Modal ─────────────────────────────────── */

      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }

      .modal-overlay.open {
        display: flex;
      }

      .modal {
        background: white;
        border-radius: 16px;
        padding: 32px;
        width: 360px;
        max-width: 90vw;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .modal h2 {
        font-size: 22px;
        font-weight: 700;
        color: #333;
        text-align: center;
      }

      .modal-section-label {
        font-size: 12px;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
      }

      .user-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 200px;
        overflow-y: auto;
      }

      .user-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        font-size: 15px;
        font-weight: 500;
        color: #333;
      }

      .user-item:hover {
        border-color: #667eea;
        background: #f5f6ff;
      }

      .user-item.selected {
        border-color: #667eea;
        background: #eef0ff;
        color: #4a56c9;
      }

      .user-item .user-delete {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
        color: #bbb;
        padding: 0 4px;
        line-height: 1;
        transition: color 0.2s;
      }

      .user-item .user-delete:hover {
        color: #dc3545;
      }

      .new-user-row {
        display: flex;
        gap: 8px;
      }

      .new-user-row input[type="text"] {
        flex: 1;
        padding: 9px 12px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }

      .new-user-row input[type="text"]:focus {
        border-color: #667eea;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      .btn-ghost {
        background: transparent;
        color: #888;
        border: 2px solid #e0e0e0;
        padding: 9px 18px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          border-color 0.2s,
          color 0.2s;
      }

      .btn-ghost:hover {
        border-color: #aaa;
        color: #555;
      }

      .btn-start {
        background: #764ba2;
        padding: 9px 22px;
      }

      .btn-start:hover {
        background: #5a3a7e;
      }

      .btn-start:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      .user-indicator {
        font-size: 11px;
        color: #764ba2;
        font-weight: 600;
        text-align: center;
        margin-top: 2px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="controls">
        <div class="control-group">
          <label>Category</label>
          <select id="categorySelect">
            <option value="all">All</option>
          </select>
        </div>
        <div class="control-group" id="intervalGroup">
          <label>Interval (seconds)</label>
          <input type="number" id="intervalInput" value="5" min="1" max="60" />
        </div>
        <button
          class="btn btn-secondary"
          id="switchListBtn"
          onclick="switchWordList()"
        >
          Switch to Top 1000
        </button>
        <button
          class="btn btn-learning-mode"
          id="learningModeBtn"
          onclick="openLearningModeModal()"
        >
          Learning Mode
        </button>
        <div class="user-indicator" id="userIndicator"></div>
      </div>
    </div>

    <!-- User selection modal -->
    <div class="modal-overlay" id="learningModal">
      <div class="modal">
        <h2>📚 Learning Mode</h2>

        <div id="userListSection">
          <div class="modal-section-label">Select a learner</div>
          <div class="user-list" id="userList"></div>
        </div>

        <div>
          <div class="modal-section-label">New learner</div>
          <div class="new-user-row">
            <input
              type="text"
              id="newUserInput"
              placeholder="Enter a name…"
              maxlength="40"
              onkeydown="if (event.key === 'Enter') addAndSelectUser();"
            />
            <button
              class="btn btn-secondary btn-small"
              onclick="addAndSelectUser()"
            >
              Add
            </button>
          </div>
        </div>

        <div class="modal-actions">
          <button class="btn-ghost" onclick="closeLearningModeModal()">
            Cancel
          </button>
          <button
            class="btn btn-start"
            id="startLearningBtn"
            onclick="startLearningWithSelectedUser()"
            disabled
          >
            Start ▶
          </button>
        </div>
      </div>
    </div>

    <div class="main-container">
      <div class="card">
        <div class="embed-container" id="videoPlayer" style="display: none">
          <iframe
            name="asl_player"
            id="asl_player"
            src="about:blank"
            allow="autoplay; encrypted-media"
          ></iframe>
        </div>
        <div class="card-content" id="cardContent">
          <div class="empty-state">Loading word list...</div>
        </div>
      </div>
    </div>

    <div class="bottom-controls">
      <button class="control-btn" onclick="previousWord()">⬅️</button>
      <button class="control-btn" id="playPauseBtn" onclick="togglePlay()">
        ▶️
      </button>
      <button class="control-btn" id="helpBtn" onclick="showHelp()">🎦</button>
      <button class="control-btn" onclick="nextWordManual()">➡️</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="timer-bar" id="timerBar" style="display: none">
      <div class="timer-progress" id="timerProgress"></div>
    </div>

    <!-- Unknown words panel -->
    <div class="unknown-panel" id="unknownPanel">
      <div class="unknown-panel-title">
        Still Learning
        <span class="unknown-panel-count" id="unknownCount">0</span>
      </div>
      <div class="unknown-panel-list" id="unknownList">
        <div class="unknown-panel-empty">None yet</div>
      </div>
    </div>

    <!-- Alphabet navigation bar (learning mode) -->
    <div class="alphabet-bar" id="alphabetBar"></div>

    <!-- Celebration overlay -->
    <canvas id="confettiCanvas" style="display: none"></canvas>
    <div class="celebration-overlay" id="celebrationOverlay">
      <div class="celebration-card">
        <div class="celebration-emoji">🎉</div>
        <div class="celebration-title">Category Complete!</div>
        <div class="celebration-subtitle" id="celebrationSubtitle"></div>
        <button class="btn" onclick="dismissCelebration()">
          Keep Going! 🚀
        </button>
      </div>
    </div>

    <!-- Progress summary overlay (wrap without full completion) -->
    <div class="celebration-overlay" id="summaryOverlay">
      <div class="celebration-card">
        <div class="celebration-emoji">📊</div>
        <div class="celebration-title">Round Complete!</div>
        <div class="summary-stats">
          <div class="summary-stat known">
            <div class="summary-stat-count" id="summaryKnownCount">0</div>
            <div class="summary-stat-label">✅ Known</div>
          </div>
          <div class="summary-stat unknown">
            <div class="summary-stat-count" id="summaryUnknownCount">0</div>
            <div class="summary-stat-label">❌ Still learning</div>
          </div>
        </div>
        <button class="btn" onclick="dismissSummary()">Keep Going! 🚀</button>
      </div>
    </div>

    <script>
      let allWords = [];
      let currentWords = [];
      let currentIndex = 0;
      let isPlaying = false;
      let showingHelp = false;
      let timerIntervalId = null;
      let timerStartTime = null;
      let timerDuration = 0;
      let nextWordTime = null;

      // Keyboard shortcuts
      document.addEventListener("keydown", (e) => {
        if (isLearningMode) return;
        if (e.code === "Space") {
          e.preventDefault();
          togglePlay();
        } else if (e.code === "ArrowLeft") {
          e.preventDefault();
          previousWord();
        } else if (e.code === "ArrowRight") {
          e.preventDefault();
          nextWordManual();
        } else if (
          (e.key === "h" || e.key === "H") &&
          e.target.tagName !== "TEXTAREA" &&
          e.target.tagName !== "INPUT" &&
          e.target.tagName !== "SELECT"
        ) {
          e.preventDefault();
          showHelp();
        }
      });

      let activeList = "default";
      let DEFAULT_CSV_REF = "";

      function loadCSV(csv, listName) {
        const lines = csv.split("\n");
        const newWords = [];
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          if (
            i === 0 &&
            line.toLowerCase().includes("category") &&
            line.toLowerCase().includes("word")
          )
            continue;
          const parts = line.split(",").map((p) => p.trim());
          if (parts.length >= 2 && parts[1]) {
            newWords.push({
              category: parts[0],
              word: parts[1],
              video_url: parts[2] || "",
            });
          }
        }
        if (newWords.length === 0) {
          document.getElementById("cardContent").innerHTML =
            '<div class="empty-state">No words found in list</div>';
          return;
        }
        activeList = listName;
        const btn = document.getElementById("switchListBtn");
        if (btn)
          btn.textContent =
            activeList === "default"
              ? "Switch to Top 1000"
              : "Switch to Default";
        allWords = newWords;
        currentIndex = 0;
        populateCategories();
        filterWords();
        updateStats();
      }

      function switchWordList() {
        if (activeList === "default") {
          loadCSV(TOP1000_CSV, "top1000");
        } else {
          loadCSV(DEFAULT_CSV_REF, "default");
        }
      }

      function populateCategories() {
        const select = document.getElementById("categorySelect");
        const categories = new Set(allWords.map((w) => w.category));

        select.innerHTML = '<option value="all">All</option>';
        categories.forEach((cat) => {
          const option = document.createElement("option");
          option.value = cat;
          option.textContent = cat;
          select.appendChild(option);
        });
      }

      function filterWords() {
        const category = document.getElementById("categorySelect").value;

        const filtered =
          category === "all"
            ? [...allWords]
            : allWords.filter((w) => w.category === category);

        // Remove duplicates by word text (case-insensitive), keeping first occurrence
        const seen = new Set();
        const deduped = filtered.filter((w) => {
          const key = w.word.toLowerCase().trim();
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });

        currentWords = isLearningMode ? deduped : shuffleArray(deduped);
        // In learning mode, find the first word that passes the probability check
        // by treating the "previous" index as the last slot so the search starts at 0.
        currentIndex =
          isLearningMode && currentWords.length > 0
            ? getNextLearningIndex(currentWords.length - 1)
            : 0;
        showingHelp = false;
        learningPreviewIndex = null;
        displayCard();
        updateStats();
        if (isLearningMode) renderAlphabetBar();
      }

      function displayCard() {
        const content = document.getElementById("cardContent");
        const videoPlayer = document.getElementById("videoPlayer");
        const header = document.querySelector(".header");
        const helpBtn = document.getElementById("helpBtn");

        if (currentWords.length === 0) {
          content.innerHTML =
            '<div class="empty-state">No words available</div>';
          videoPlayer.style.display = "none";
          header.style.display = "flex";
          helpBtn.disabled = true;
          return;
        }

        const word = currentWords[currentIndex];

        // Enable/disable help button based on video availability
        if (word.video_url && word.video_url.trim() !== "") {
          helpBtn.disabled = false;
        } else {
          helpBtn.disabled = true;
        }

        if (showingHelp && word.video_url) {
          header.style.display = "none";
          videoPlayer.style.display = "block";
          // Clean up double slashes but keep them if that's what LifePrint uses
          let videoUrl = word.video_url;
          // Use autoplay with mute - browsers block autoplay with sound
          if (!videoUrl.includes("?")) {
            videoUrl += "?autoplay=1&mute=1&rel=0";
          } else if (!videoUrl.includes("autoplay")) {
            videoUrl += "&autoplay=1&mute=1";
          }
          console.log("Loading video URL:", videoUrl);
          console.log(
            "Video player element:",
            document.getElementById("videoPlayer"),
          );
          console.log("IFrame element:", document.getElementById("asl_player"));

          const iframe = document.getElementById("asl_player");
          iframe.src = videoUrl;

          content.innerHTML = `
                    <div class="word" style="margin-top: 20px;">${word.word}</div>
                    <div class="category-badge">${word.category}</div>
                    <div style="font-size: 14px; color: #999; margin-top: 15px;">
                        💡 Video will be muted for autoplay. Click to unmute.
                    </div>
                    ${isLearningMode ? `<div class="learning-controls"><button class="btn btn-continue" onclick="learningContinue()">${learningPreviewIndex !== null ? "← Return to lesson" : "Continue ➡️"}</button></div>` : ""}
                `;
        } else if (showingHelp && !word.video_url) {
          header.style.display = "none";
          videoPlayer.style.display = "none";
          content.innerHTML = `
            <div class="no-video">No Video Defined</div>
            ${isLearningMode ? `<div class="learning-controls"><button class="btn btn-continue" onclick="learningContinue()">${learningPreviewIndex !== null ? "← Return to lesson" : "Continue ➡️"}</button></div>` : ""}
          `;
        } else {
          header.style.display = "flex";
          videoPlayer.style.display = "none";
          document.getElementById("asl_player").src = "";
          if (isLearningMode) {
            const count = getLearningCount(word.word);
            content.innerHTML = `
                      <div class="word">${word.word}</div>
                      <div class="category-badge">${word.category}</div>
                      <div class="learning-badge">${count === null ? "First time seeing this" : count === 0 ? "Keep practicing" : `Familiarity score: ${count}`}</div>
                      <div class="learning-controls">
                        <button class="btn btn-know" onclick="iKnowThis()">✅ I know this</button>
                        <button class="btn btn-dont-know" onclick="iDontKnowThis()">❌ I don't know this</button>
                      </div>
                  `;
          } else {
            content.innerHTML = `
                      <div class="word">${word.word}</div>
                      <div class="category-badge">${word.category}</div>
                  `;
          }
        }
      }

      function extractYouTubeId(url) {
        // Clean up URL (remove double slashes after embed/)
        url = url.replace(/\/embed\/\//, "/embed/");

        const patterns = [
          /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
          /^([a-zA-Z0-9_-]{11})$/,
        ];

        for (const pattern of patterns) {
          const match = url.match(pattern);
          if (match) return match[1];
        }
        return null;
      }

      function shuffleArray(array) {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      }

      function updateTimer() {
        if (!isPlaying) return;

        const now = Date.now();
        const elapsed = now - timerStartTime;
        const progress = Math.min((elapsed / timerDuration) * 100, 100);
        document.getElementById("timerProgress").style.width = progress + "%";

        if (nextWordTime && now >= nextWordTime) {
          nextWordTime = null; // prevent double-fire before nextWord resets it
          nextWord();
        }
      }

      function startTimer() {
        timerStartTime = Date.now();
        timerDuration =
          parseInt(document.getElementById("intervalInput").value) * 1000;
        nextWordTime = timerStartTime + timerDuration;
        document.getElementById("timerBar").style.display = "block";
        document.getElementById("timerProgress").style.width = "0%";
        if (timerIntervalId) clearInterval(timerIntervalId);
        timerIntervalId = setInterval(updateTimer, 100);
      }

      function stopTimer() {
        nextWordTime = null;
        document.getElementById("timerBar").style.display = "none";
        if (timerIntervalId) {
          clearInterval(timerIntervalId);
          timerIntervalId = null;
        }
      }

      function unloadVideo() {
        document.getElementById("asl_player").src = "";
      }

      // Resume auto-play from the current word/index without reshuffling
      function resumePlay() {
        if (currentWords.length === 0) return;
        isPlaying = true;
        showingHelp = false;
        unloadVideo();
        document.getElementById("playPauseBtn").innerHTML = "⏸️";
        document.getElementById("playPauseBtn").classList.add("active");
        displayCard();
        startTimer();
      }

      function nextWord() {
        if (currentWords.length === 0) return;

        currentIndex = (currentIndex + 1) % currentWords.length;

        showingHelp = false;
        displayCard();

        if (isPlaying) {
          startTimer();
        }
      }

      function previousWord() {
        if (currentWords.length === 0) return;
        if (showingHelp) {
          // Return to the current word and resume playing
          resumePlay();
        } else {
          pause();
          currentIndex =
            (currentIndex - 1 + currentWords.length) % currentWords.length;
          showingHelp = false;
          displayCard();
        }
      }

      function nextWordManual() {
        if (currentWords.length === 0) return;
        if (showingHelp) {
          // Advance to next word and resume playing
          showingHelp = false;
          unloadVideo();
          currentIndex = (currentIndex + 1) % currentWords.length;
          resumePlay();
        } else {
          pause();
          currentIndex = (currentIndex + 1) % currentWords.length;
          showingHelp = false;
          displayCard();
        }
      }

      function togglePlay() {
        if (showingHelp) {
          // Return to current word and start playing
          resumePlay();
        } else if (isPlaying) {
          pause();
        } else {
          play();
        }
      }

      function play() {
        if (currentWords.length === 0) {
          alert("No words available.");
          return;
        }
        resumePlay();
      }

      function pause() {
        isPlaying = false;
        document.getElementById("playPauseBtn").innerHTML = "▶️";
        document.getElementById("playPauseBtn").classList.remove("active");
        stopTimer();
      }

      function showHelp() {
        pause();

        if (currentWords.length === 0) {
          alert("No words available");
          return;
        }

        showingHelp = true;
        displayCard();
      }

      function updateStats() {
        const stats = document.getElementById("stats");
        if (allWords.length > 0) {
          stats.textContent = `Total words: ${allWords.length} | Current set: ${currentWords.length}`;
        } else {
          stats.textContent = "";
        }
      }

      // ── Learning Mode ──────────────────────────────────────────────────────────

      let isLearningMode = false;
      let learningModeCounts = {};
      let currentLearningUser = null;
      let sessionUnknownWords = [];
      let learningPreviewIndex = null; // saved index while previewing a missed word

      // ── User management ────────────────────────────────────────────────────────

      const USERS_STORAGE_KEY = "asl_learning_users";

      function loadUsers() {
        try {
          return JSON.parse(localStorage.getItem(USERS_STORAGE_KEY) || "[]");
        } catch (e) {
          return [];
        }
      }

      function saveUsers(users) {
        try {
          localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(users));
        } catch (e) {}
      }

      // ── Modal ──────────────────────────────────────────────────────────────────

      let modalSelectedUser = null;

      function openLearningModeModal() {
        if (isLearningMode) {
          exitLearningMode();
          return;
        }
        modalSelectedUser = currentLearningUser;
        renderUserList();
        document.getElementById("newUserInput").value = "";
        document.getElementById("learningModal").classList.add("open");
        updateStartButton();
        // If a user is already active, focus Start immediately
        if (!modalSelectedUser) {
          setTimeout(() => document.getElementById("newUserInput").focus(), 50);
        }
      }

      function closeLearningModeModal() {
        document.getElementById("learningModal").classList.remove("open");
        modalSelectedUser = null;
      }

      function renderUserList() {
        const users = loadUsers();
        const list = document.getElementById("userList");
        const section = document.getElementById("userListSection");

        if (users.length === 0) {
          section.style.display = "none";
          list.innerHTML = "";
          return;
        }

        section.style.display = "block";
        list.innerHTML = users
          .map(
            (u) => `
          <div class="user-item${modalSelectedUser === u ? " selected" : ""}"
               data-username="${escapeHtml(u)}"
               onclick="selectModalUser(this.dataset.username)">
            <span>👤 ${escapeHtml(u)}</span>
            <button class="user-delete" title="Delete learner"
                    data-username="${escapeHtml(u)}"
                    onclick="event.stopPropagation(); deleteUser(this.dataset.username)">✕</button>
          </div>`,
          )
          .join("");
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function selectModalUser(name) {
        modalSelectedUser = name;
        renderUserList();
        updateStartButton();
      }

      function addAndSelectUser() {
        const input = document.getElementById("newUserInput");
        const name = input.value.trim();
        if (!name) return;

        const users = loadUsers();
        if (!users.includes(name)) {
          users.push(name);
          saveUsers(users);
        }
        input.value = "";
        modalSelectedUser = name;
        renderUserList();
        updateStartButton();
      }

      function deleteUser(name) {
        if (!confirm(`Delete learner "${name}"? Their progress will be lost.`))
          return;
        const users = loadUsers().filter((u) => u !== name);
        saveUsers(users);
        if (modalSelectedUser === name) {
          modalSelectedUser = null;
          updateStartButton();
        }
        if (currentLearningUser === name && isLearningMode) {
          exitLearningMode();
        }
        renderUserList();
      }

      function updateStartButton() {
        document.getElementById("startLearningBtn").disabled =
          !modalSelectedUser;
      }

      function startLearningWithSelectedUser() {
        if (!modalSelectedUser) return;
        const username = modalSelectedUser;
        closeLearningModeModal();
        enterLearningMode(username);
      }

      function getLearningStorageKey() {
        return `asl_learning_counts_${currentLearningUser || "guest"}_${activeList}`;
      }

      function loadLearningCounts() {
        try {
          const stored = localStorage.getItem(getLearningStorageKey());
          learningModeCounts = stored ? JSON.parse(stored) : {};
        } catch (e) {
          learningModeCounts = {};
        }
      }

      function saveLearningCounts() {
        try {
          localStorage.setItem(
            getLearningStorageKey(),
            JSON.stringify(learningModeCounts),
          );
        } catch (e) {}
      }

      function getLearningCount(word) {
        const val = learningModeCounts[word.toLowerCase()];
        return val === undefined ? null : val;
      }

      function setLearningCount(word, count) {
        learningModeCounts[word.toLowerCase()] = Math.max(0, count);
        saveLearningCounts();
      }

      function getShowProbability(count) {
        if (count === null || count <= 1) return 1.0;
        if (count === 2) return 0.8;
        if (count === 3) return 0.5;
        if (count === 4) return 0.3;
        return 0.15;
      }

      function shouldShowWord(wordObj) {
        const count = getLearningCount(wordObj.word);
        return Math.random() < getShowProbability(count);
      }

      function getNextLearningIndex(fromIndex) {
        const total = currentWords.length;
        for (let i = 1; i <= total; i++) {
          const idx = (fromIndex + i) % total;
          if (shouldShowWord(currentWords[idx])) {
            return idx;
          }
        }
        // All words were skipped by probability — just advance by one
        return (fromIndex + 1) % total;
      }

      function enterLearningMode(username) {
        currentLearningUser = username;
        isLearningMode = true;
        learningPreviewIndex = null;
        pause();
        loadLearningCounts();
        sessionUnknownWords = [];
        renderUnknownPanel();
        filterWords();
        const btn = document.getElementById("learningModeBtn");
        btn.textContent = "Exit Learning Mode";
        btn.classList.add("active");
        document.getElementById("userIndicator").textContent = "👤 " + username;
        document.querySelector(".bottom-controls").style.display = "none";
        document.getElementById("intervalGroup").style.display = "none";
        document.getElementById("timerBar").style.display = "none";
        document.getElementById("unknownPanel").classList.add("visible");
        document.getElementById("alphabetBar").classList.add("visible");
      }

      function exitLearningMode() {
        isLearningMode = false;
        learningPreviewIndex = null;
        currentLearningUser = null;
        filterWords();
        const btn = document.getElementById("learningModeBtn");
        btn.textContent = "Learning Mode";
        btn.classList.remove("active");
        document.getElementById("userIndicator").textContent = "";
        document.querySelector(".bottom-controls").style.display = "flex";
        document.getElementById("intervalGroup").style.display = "flex";
        document.getElementById("unknownPanel").classList.remove("visible");
        document.getElementById("alphabetBar").classList.remove("visible");
      }

      function iKnowThis() {
        const word = currentWords[currentIndex];
        const count = getLearningCount(word.word);
        setLearningCount(word.word, count + 1);
        advanceLearningWord();
      }

      function iDontKnowThis() {
        const word = currentWords[currentIndex];
        const count = getLearningCount(word.word);
        setLearningCount(word.word, count === 1 ? 0 : 1);
        addToUnknownPanel(word.word);
        showingHelp = true;
        displayCard();
      }

      function learningContinue() {
        if (learningPreviewIndex !== null) {
          currentIndex = learningPreviewIndex;
          learningPreviewIndex = null;
          showingHelp = false;
          unloadVideo();
          displayCard();
        } else {
          advanceLearningWord();
        }
      }

      function advanceLearningWord() {
        const fromIndex = currentIndex;
        const newIndex = getNextLearningIndex(fromIndex);
        const wrapped = newIndex < fromIndex;
        currentIndex = newIndex;
        showingHelp = false;
        unloadVideo();
        if (wrapped && allWordsSeenInCategory()) {
          showCelebration();
        } else if (wrapped) {
          showSummary();
        } else {
          displayCard();
        }
      }

      function allWordsSeenInCategory() {
        return currentWords.every((w) => getLearningCount(w.word) > 0);
      }

      // ── Celebration ────────────────────────────────────────────────────────────

      let confettiAnimId = null;

      function showCelebration() {
        const count = currentWords.length;
        document.getElementById("celebrationSubtitle").textContent =
          `You've correctly signed all ${count} word${count !== 1 ? "s" : ""} at least once!`;
        document.getElementById("celebrationOverlay").classList.add("open");
        launchConfetti();
      }

      function dismissCelebration() {
        document.getElementById("celebrationOverlay").classList.remove("open");
        stopConfetti();
        displayCard();
      }

      function showSummary() {
        const known = currentWords.filter(
          (w) => getLearningCount(w.word) > 0,
        ).length;
        const unknown = currentWords.length - known;
        document.getElementById("summaryKnownCount").textContent = known;
        document.getElementById("summaryUnknownCount").textContent = unknown;
        document.getElementById("summaryOverlay").classList.add("open");
      }

      function dismissSummary() {
        document.getElementById("summaryOverlay").classList.remove("open");
        displayCard();
      }

      function addToUnknownPanel(wordText) {
        if (!sessionUnknownWords.includes(wordText)) {
          sessionUnknownWords.unshift(wordText); // newest at top
          renderUnknownPanel();
        }
      }

      function renderUnknownPanel() {
        const list = document.getElementById("unknownList");
        const countEl = document.getElementById("unknownCount");
        countEl.textContent = sessionUnknownWords.length;
        if (sessionUnknownWords.length === 0) {
          list.innerHTML = '<div class="unknown-panel-empty">None yet</div>';
        } else {
          list.innerHTML = sessionUnknownWords
            .map(
              (w) =>
                `<div class="unknown-word-item" data-word="${escapeHtml(w)}" onclick="previewUnknownWord(this.dataset.word)" title="Watch video">🎬 ${escapeHtml(w)}</div>`,
            )
            .join("");
        }
      }

      function renderAlphabetBar() {
        const bar = document.getElementById("alphabetBar");
        const available = new Set(
          currentWords
            .filter((w) => w.word && w.word.length > 0)
            .map((w) => w.word[0].toUpperCase())
            .filter((l) => /[A-Z]/.test(l)),
        );
        bar.innerHTML = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
          .split("")
          .map(
            (l) =>
              `<button class="alpha-btn ${available.has(l) ? "has-words" : ""}" onclick="jumpToLetter('${l}')">${l}</button>`,
          )
          .join("");
      }

      function jumpToLetter(letter) {
        if (!isLearningMode) return;
        const idx = currentWords.findIndex(
          (w) => w.word && w.word[0].toUpperCase() === letter,
        );
        if (idx === -1) return;
        currentIndex = idx;
        showingHelp = false;
        learningPreviewIndex = null;
        unloadVideo();
        displayCard();
      }

      function previewUnknownWord(wordText) {
        if (learningPreviewIndex === null) {
          learningPreviewIndex = currentIndex;
        }
        const idx = currentWords.findIndex((w) => w.word === wordText);
        if (idx === -1) return;
        currentIndex = idx;
        showingHelp = true;
        displayCard();
      }

      function launchConfetti() {
        const canvas = document.getElementById("confettiCanvas");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.style.display = "block";
        const ctx = canvas.getContext("2d");

        const colors = [
          "#667eea",
          "#764ba2",
          "#28a745",
          "#ffc107",
          "#dc3545",
          "#17a2b8",
          "#fd7e14",
          "#e83e8c",
        ];
        const pieces = Array.from({ length: 120 }, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * -canvas.height,
          w: Math.random() * 10 + 6,
          h: Math.random() * 6 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * Math.PI * 2,
          rotationSpeed: (Math.random() - 0.5) * 0.2,
          vx: (Math.random() - 0.5) * 3,
          vy: Math.random() * 3 + 2,
        }));

        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          pieces.forEach((p) => {
            p.x += p.vx;
            p.y += p.vy;
            p.rotation += p.rotationSpeed;
            if (p.y > canvas.height) {
              p.y = -20;
              p.x = Math.random() * canvas.width;
            }
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
          });
          confettiAnimId = requestAnimationFrame(draw);
        }

        if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
        draw();
      }

      function stopConfetti() {
        if (confettiAnimId) {
          cancelAnimationFrame(confettiAnimId);
          confettiAnimId = null;
        }
        const canvas = document.getElementById("confettiCanvas");
        canvas.style.display = "none";
        canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
      }

      // Event listeners
      document
        .getElementById("categorySelect")
        .addEventListener("change", filterWords);
    </script>
  </body>
</html>
